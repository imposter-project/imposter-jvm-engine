plugin: "io.gatehill.imposter.config.support.BasePathSupportingPluginConfig"
basePath: /base

# explicitly do not set path
# path: /

resources:
- path: /example
  response:
    statusCode: 200
    content: "example"

interceptors:
# interceptor with a path should be prefixed with the base path
- path: /intercepted
  continue: true
# interceptor without a path matches all requests and must not be prefixed
- continue: true
  response:
    statusCode: 401
